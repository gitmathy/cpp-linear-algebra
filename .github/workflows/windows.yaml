name: Windows build and unit tests (solution file) 👷
description: Build the executable msbuild

on:
  pull_request:
    branches: [ "main" ]

jobs:
  compile_all:
    name: Compile all
    runs-on:  windows-latest
    strategy:
      # Define all combinations you want to build
      matrix:
        configuration: [Debug, Release]
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8    # v6.0.1
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2
    - name: Setup NuGet
      uses: NuGet/setup-nuget@323ab0502cd38fdc493335025a96c8fdb0edc71f # v2.0.1
    - name: Restore NuGet Packages
      run: nuget restore cpp-linear-algebra.slnx
    # - name: Install Intel Thread Building Block (TBB)
    #   shell: bash
    #   run: |
    #     sudo apt update
    #     sudo apt install libtbb-dev
    - name: ⚒️ Build unit tests
      run: |
        msbuild unit_tests/unit_tests.vcxproj `
        /p:Configuration=${{ matrix.configuration }} `
        /p:Platform=x64 `
        /p:PlatformToolset=v143 `
        /m
    - name: 🧪 Run Google Tests
      shell: pwsh
      run: |
        # Use vswhere to find the latest VSTest path
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        $vstest = Join-Path $vsPath "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"

        # Execute the tests
        & $vstest `
          "unit_tests\x64\${{ matrix.configuration }}\unit_tests.exe" `
          /TestAdapterPath:"packages\GoogleTestAdapter.0.18.0\build\native"
